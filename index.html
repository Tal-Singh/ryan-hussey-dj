<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ryan Hussey DJ Press Pack</title>
  <style>
    :root {
      color-scheme: dark;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      min-height: 100%;
    }

    .desktop-view {
      display: block;
    }

    .mobile-view {
      display: none;
      min-height: 100vh;
      box-sizing: border-box;
      padding: 24px;
      text-align: center;
      align-content: center;
    }

    iframe {
      display: block;
      border: 0;
      width: 100%;
      height: 100vh;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
    }

    p {
      margin: 0 0 20px;
      color: #ccc;
      line-height: 1.5;
    }

    .button {
      display: inline-block;
      padding: 14px 22px;
      background: #fff;
      color: #000;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    @media (max-width: 768px) {
      .desktop-view {
        display: none;
      }

      .mobile-view {
        display: grid;
      }
    }
  </style>
</head>
<body>
  <div class="desktop-view">
    <iframe src="press-pack.pdf"></iframe>
  </div>

  <div class="mobile-view">
    <div>
      <h1>Ryan Hussey DJ</h1>
      <p>Tap below to open the press pack in full screen.</p>
      <a class="button" href="press-pack.pdf" target="_blank" rel="noopener">
        Open Press Pack
      </a>
    </div>
  </div>
</body>
</html>
