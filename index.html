<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ryan Hussey DJ Press Pack</title>

  <style>
    :root {
      color-scheme: dark;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      height: 100%;
    }

    /* DESKTOP VIEW */
    .desktop-view {
      display: block;
      height: 100%;
    }

    iframe {
      width: 100%;
      height: 100vh;
      border: none;
    }

    /* MOBILE VIEW */
    .mobile-view {
      display: none;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .mobile-content {
      max-width: 400px;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 10px;
    }

    p {
      color: #ccc;
      margin-bottom: 20px;
    }

    .button {
      display: inline-block;
      padding: 14px 24px;
      background: #fff;
      color: #000;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }

    /* SWITCH TO MOBILE */
    @media (max-width: 768px) {
      .desktop-view {
        display: none;
      }

      .mobile-view {
        display: flex;
      }
    }
  </style>
</head>

<body>

  <!-- DESKTOP -->
  <div class="desktop-view">
    <iframe src="press-pack.pdf"></iframe>
  </div>

  <!-- MOBILE -->
  <div class="mobile-view">
    <div class="mobile-content">
      <h1>Ryan Hussey DJ</h1>
      <p>Tap below to view the press pack</p>
      <a class="button" href="press-pack.pdf" target="_blank">
        Open Press Pack
      </a>
    </div>
  </div>

</body>
</html>
