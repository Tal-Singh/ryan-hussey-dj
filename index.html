<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ryan Hussey DJ Press Pack</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      height: 100%;
    }

    /* DESKTOP VIEW */
    .desktop-view {
      display: block;
      width: 100%;
      height: 100vh;
    }

    iframe {
      display: block;
      border: 0;
      width: 100%;
      height: 100%;
    }

    /* MOBILE VIEW */
    .mobile-view {
      display: none;
      height: 100vh;
      box-sizing: border-box;
      padding: 24px;
      text-align: center;
      align-content: center;
      justify-content: center;
      display: flex;
      flex-direction: column;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 12px;
    }

    p {
      margin-bottom: 20px;
      opacity: 0.8;
    }

    .btn {
      display: inline-block;
      padding: 12px 20px;
      background: #fff;
      color: #000;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }

    /* MOBILE BREAKPOINT */
    @media (max-width: 768px) {
      .desktop-view {
        display: none !important;
      }

      .mobile-view {
        display: flex !important;
      }
    }
  </style>
</head>

<body>

  <!-- DESKTOP PDF VIEW -->
  <div class="desktop-view">
    <iframe src="press-pack.pdf"></iframe>
  </div>

  <!-- MOBILE BUTTON VIEW -->
  <div class="mobile-view">
    <h1>Ryan Hussey DJ</h1>
    <p>Tap below to view the press pack</p>
    <a class="btn" href="press-pack.pdf" target="_blank">Open Press Pack</a>
  </div>

</body>
</html>
